# Render Blueprint — provisions BOTH services from one repo.
# In Render: New + → Blueprint → pick this repo. It reads this file.
# (You can also create each service manually in the dashboard; see DEPLOY.md.)

services:
  # ---------------------------------------------------------------- #
  # 1) FastAPI backend  →  https://<name>.onrender.com  (later api.<domain>)
  # ---------------------------------------------------------------- #
  - type: web
    name: shri-nirmal-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SMTP_SERVER
        sync: false          # set in dashboard (secret)
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false          # set in dashboard (secret)
      - key: SMTP_PASSWORD
        sync: false          # set in dashboard (secret)
      - key: MAIL_TO
        value: anurag15work@gmail.com
      - key: MAIL_FROM
        sync: false          # e.g. your verified sender
      - key: MAIL_FROM_NAME
        value: Shri Nirmal Logistics - Website
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://www.yourdomain.com,https://yourdomain.com

  # ---------------------------------------------------------------- #
  # 2) Static React frontend  →  https://<name>.onrender.com  (later www.<domain>)
  # ---------------------------------------------------------------- #
  - type: web
    name: shri-nirmal-ui
    runtime: static
    rootDir: ui
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_QUOTES_API
        sync: false          # e.g. https://api.yourdomain.com/api/quotes
      - key: VITE_WAITLIST_API
        sync: false          # e.g. https://api.yourdomain.com/api/waitlist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

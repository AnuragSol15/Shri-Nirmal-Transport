<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apply persisted theme before paint to avoid a flash (defaults to light) -->
    <script>
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>

    <!-- Primary SEO meta (further managed at runtime via react-helmet-async) -->
    <title>Shri Nirmal Logistics & DN Transport — Daily FTL/PTL from Indore</title>
    <meta
      name="description"
      content="Shri Nirmal Logistics & DN Transport (Chouhan Brothers) — reliable daily FTL & PTL road transport from Indore across central Madhya Pradesh. Get a quick quote for your next shipment."
    />
    <meta name="theme-color" content="#FF5722" />

    <!-- Open Graph. Absolute URLs are required by scrapers; the domain is injected
         at build time from the VITE_SITE_URL env var (see .env / render.yaml). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shri Nirmal Logistics & DN Transport" />
    <meta
      property="og:description"
      content="Reliable daily FTL & PTL road transport from Indore across central Madhya Pradesh."
    />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Shri Nirmal Logistics & DN Transport" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Shri Nirmal Logistics & DN Transport — daily FTL & PTL road transport from Indore"
    />

    <!-- Twitter / X large-image card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shri Nirmal Logistics & DN Transport" />
    <meta
      name="twitter:description"
      content="Reliable daily FTL & PTL road transport from Indore across central Madhya Pradesh."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />

    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: surfaces the business in Google local/maps results.
         %VITE_SITE_URL% is replaced with the live domain at build time. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MovingCompany",
        "name": "Shri Nirmal Logistics & DN Transport",
        "legalName": "Chouhan Logistics (Shri Nirmal & DN Transport)",
        "description": "Daily FTL & PTL (full-truck and part-load) road transport from Indore across Madhya Pradesh.",
        "url": "%VITE_SITE_URL%/",
        "image": "%VITE_SITE_URL%/og-image.png",
        "logo": "%VITE_SITE_URL%/og-image.png",
        "telephone": "+918817670032",
        "email": "shreenirmaldntransport@gmail.com",
        "priceRange": "$$",
        "areaServed": {
          "@type": "State",
          "name": "Madhya Pradesh"
        },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "SR Compound, 111/6, opposite Mongia Rathi Transport, Dewas Naka",
          "addressLocality": "Indore",
          "addressRegion": "Madhya Pradesh",
          "postalCode": "452010",
          "addressCountry": "IN"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "00:00",
          "closes": "23:59"
        }
      }
    </script>
  </head>
  <body class="bg-steel-50 font-sans leading-relaxed text-steel-950 antialiased dark:bg-steel-950 dark:text-steel-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F5F2ED" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Diagonal route line motif -->
  <path d="M -40 600 L 420 360 L 800 250 L 1240 40" fill="none" stroke="#FF5722" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <circle cx="420" cy="360" r="6" fill="#FF5722"/>
  <circle cx="800" cy="250" r="6" fill="#FF5722"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#FF5722"/>

  <!-- Logo badge -->
  <rect x="90" y="120" width="92" height="92" rx="18" fill="#FF5722"/>
  <text x="136" y="184" fill="#ffffff" font-size="44" font-weight="800" text-anchor="middle">SN</text>

  <!-- Company name -->
  <text x="206" y="160" fill="#ffffff" font-size="34" font-weight="700">Shri Nirmal Logistics</text>
  <text x="206" y="200" fill="#FF7A52" font-size="34" font-weight="700">&amp; DN Transport</text>

  <!-- Headline -->
  <text x="90" y="330" fill="#ffffff" font-size="64" font-weight="800">Road transport that</text>
  <text x="90" y="408" fill="#ffffff" font-size="64" font-weight="800">runs on <tspan fill="#FF7A52">schedule.</tspan></text>

  <!-- Subhead -->
  <text x="90" y="470" fill="#cbd5e1" font-size="28" font-weight="500">Daily FTL &amp; PTL freight from the Indore hub, across Madhya Pradesh.</text>

  <!-- Trust pills -->
  <g fill="#94a3b8" font-size="24" font-weight="600">
    <circle cx="100" cy="540" r="5" fill="#FF5722"/>
    <text x="116" y="548">Insured Cargo</text>
    <circle cx="356" cy="540" r="5" fill="#FF5722"/>
    <text x="372" y="548">Daily Departures</text>
    <circle cx="660" cy="540" r="5" fill="#FF5722"/>
    <text x="676" y="548">Regional Network</text>
  </g>

  <!-- Phone -->
  <text x="1110" y="548" fill="#ffffff" font-size="26" font-weight="700" text-anchor="end">+91-88176-70032</text>
</svg>
